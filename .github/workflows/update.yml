name: update-blocklist

on:
  schedule:
    # 每 4 小时，避开整点 (UTC). 北京时间 ≈ 05:17 / 09:17 / 13:17 / 17:17 / 21:17 / 01:17
    - cron: "17 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch & merge feeds
        run: node scripts/fetch.mjs

      - name: Rebuild version manifest
        run: node scripts/gen-version.mjs

      - name: Commit if changed
        run: |
          git config user.name  "data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "no changes, skip commit"
          else
            git commit -m "data: auto update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
